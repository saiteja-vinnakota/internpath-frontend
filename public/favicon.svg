<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- background rounded square -->
  <rect width="32" height="32" rx="7" fill="#0f0e0c"/>
  <!-- scale 18x18 coords up to fill ~28x28 area, centered with 2px padding -->
  <!-- scale factor: 28/18 = 1.555, offset: 2px each side -->
  <g transform="translate(2, 2) scale(1.555)">
    <path d="M3 14l3-4 3 2 3-5 3 4" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="9" cy="4" r="1.5" stroke="white" stroke-width="1.4" fill="none"/>
  </g>
</svg>
